# ==============================================================================
# MISSION PERFORMANCE CONFIGURATION (YAML)
# ==============================================================================
# USE THIS FILE FOR: Tuning how the robot moves and detects objects physically.
# LIVE TUNING: These values can be changed while the robot is running using:
#              "ros2 param set /prequalification_bt <param_name> <value>"
# ==============================================================================

prequalification_bt:
  ros__parameters:
    # --- GLOBAL SPEEDS ---
    # NOTE: Set to 0.1 for first hardware test. Increase to move faster.
    base_surge_speed: 1.4
    base_yaw_speed: 0.1

    # --- DETECTION CONFIDENCE ---
    # NOTE: Lower these if objects are missed or flickering.
    gate_conf_thresh: 0.6
    pole_conf_thresh: 0.3

    # --- TOLERANCES & PRECISION ---
    # NOTE: Increase depth_tolerance if bot jitters up and down at target depth.
    depth_tolerance: 0.15
    # NOTE: Increase deadbands if bot takes too long to align with target.
    gate_align_deadband: 0.04
    pole_align_deadband: 0.06

    # --- ORBIT SETTINGS ---
    # NOTE: How long the bot surges forward during each of the 8 steps of the orbit octagon.
    # Increase to make a larger circle, decrease to make it tighter.
    orbit_surge_duration: 4.0

    # NOTE: The angle to turn during each orbit step (degrees). 
    # 90.0 is a perfect square orbit. 85.0 spirals slightly inward.
    orbit_step_angle: 85.0
